version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: seasonal_food_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: seasonal_foods
      MYSQL_USER: fooduser
      MYSQL_PASSWORD: foodpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "fooduser", "-pfoodpass"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - food_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seasonal_food_backend
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: fooduser
      MYSQL_PASSWORD: foodpass
      MYSQL_DATABASE: seasonal_foods
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - food_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seasonal_food_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - food_network

volumes:
  mysql_data:
    driver: local

networks:
  food_network:
    driver: bridge
